version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: caloscanai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: caloscanai
      POSTGRES_USER: ${DB_USER:-caloscanai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - caloscanai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-caloscanai} -d caloscanai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CaloScanAi Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: caloscanai_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: caloscanai
      DB_USER: ${DB_USER:-caloscanai}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      AI_API_KEY: ${AI_API_KEY:-your-api-key}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    volumes:
      - ./uploads:/app/uploads
      - ./backups/db:/app/backups/db
    ports:
      - "3002:3000"
    networks:
      - caloscanai_network
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: caloscanai_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - caloscanai_network
    depends_on:
      - app

networks:
  caloscanai_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local