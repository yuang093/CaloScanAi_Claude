services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: caloscanai_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      AI_API_KEY: ${AI_API_KEY:-your-api-key}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    volumes:
      - app_data:/app/data
      - ./uploads:/app/uploads
    networks:
      - caloscanai_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: caloscanai_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "3080:80"
      - "443:443"
    networks:
      - caloscanai_network
    depends_on:
      - app

networks:
  caloscanai_network:
    driver: bridge

volumes:
  app_data:
    driver: local
