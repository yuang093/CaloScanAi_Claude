<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaloScanAi - 登入</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥗%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="src/styles/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      background: linear-gradient(135deg, var(--color-bg-dark, #1a1a2e) 0%, var(--color-bg-dark-2, #16213e) 50%, var(--color-primary-dark, #0f3460) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.4s ease;
    }
    [data-theme="playful"] {
      --color-bg-dark: #1a1225;
      --color-bg-dark-2: #251a35;
      --color-primary-dark: #3d2d55;
    }
    [data-theme="natural"] {
      --color-bg-dark: #0d1a12;
      --color-bg-dark-2: #152118;
      --color-primary-dark: #1c2b20;
    }
    [data-theme="warm"] {
      --color-bg-dark: #2a1f1a;
      --color-bg-dark-2: #3a2a22;
      --color-primary-dark: #4a3830;
    }
    .login-container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }
    .logo span { color: var(--color-primary, #74c69d); transition: color 0.3s; }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary, #74c69d);
      background: rgba(255,255,255,0.12);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--color-primary, #74c69d);
      color: var(--color-text-inverse, #1a1a2e);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: var(--color-primary-light, #95d5b2);
      transform: translateY(-2px);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .social-login {
      display: flex;
      gap: 12px;
    }
    .btn-social {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .register-link {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
    }
    .register-link a {
      color: var(--color-primary, #74c69d);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .register-link a:hover {
      color: var(--color-primary-light, #95d5b2);
    }
    .theme-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .theme-btn.active {
      border-color: #fff;
      transform: scale(1.15);
    }
  </style>
</head>
<body data-theme="natural" data-mode="light">
  <div class="login-container">
    <div class="theme-selector">
      <button class="theme-btn" onclick="setTheme('playful')" style="background: #FF6B9D;" title="俏皮">🎨</button>
      <button class="theme-btn active" onclick="setTheme('natural')" style="background: #2d6a4f;" title="自然">🌿</button>
      <button class="theme-btn" onclick="setTheme('warm')" style="background: #c85a3b;" title="溫暖">🍊</button>
    </div>

    <div class="logo">Calo<span>Scan</span>Ai</div>
    <p class="subtitle">AI 智慧熱量追蹤，拍照記錄每一餐</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="username-input" placeholder="請輸入帳號" required>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password-input" placeholder="請輸入密碼" required>
      </div>
      <button type="submit" class="btn-login">登入</button>
    </form>

    <div class="register-link">
      還沒有帳號？<a href="#">立即註冊</a>
    </div>
  </div>

  <script>
    // Theme management
    function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('caloscanai_theme', theme);

      // Update active button
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.remove('active');
        const btnTheme = btn.style.background.includes('FF6B9D') ? 'playful' :
                        btn.style.background.includes('2d6a4f') ? 'natural' : 'warm';
        if (btnTheme === theme) btn.classList.add('active');
      });
    }

    // Initialize theme from localStorage
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('caloscanai_theme') || 'natural';
      setTheme(savedTheme);
    });

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username-input').value;
      const password = document.getElementById('password-input').value;
      const btn = document.querySelector('.btn-login');

      btn.disabled = true;
      btn.textContent = '登入中...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem('token', result.data.token);
          localStorage.setItem('user', JSON.stringify(result.data.user));
          window.location.href = 'dashboard.html';
        } else {
          const errMsg = typeof result.error === 'string' ? result.error : (result.error?.message || '登入失敗');
          alert(errMsg);
          btn.disabled = false;
          btn.textContent = '登入';
        }
      } catch (error) {
        alert('登入失敗，請稍後再試');
        btn.disabled = false;
        btn.textContent = '登入';
      }
    }
  </script>
</body>
</html>
